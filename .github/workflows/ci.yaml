name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check src tests --output-format=github

      - name: Pytest
        run: pytest tests -v --tb=short -m "not slow"
        env:
          PYTHONPATH: .
          ENV: test

      - name: Check for hardcoded secrets
        run: |
          # Fail if any obvious secrets patterns are found in source
          ! grep -rn "password.*=.*['\"].*['\"]" src/ --include="*.py" | grep -v "test" | grep -v "#" | grep -v "example" | grep -v "placeholder" | grep -v "__pycache__" || true

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: trading-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f deploy/docker/Dockerfile.api -t trading-api:ci .

      - name: Build frontend image
        run: docker build -f deploy/docker/Dockerfile.frontend -t trading-frontend:ci .
