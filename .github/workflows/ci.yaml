name: CI

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION_PRIMARY: "3.11"
  NODE_VERSION: "20"

jobs:
  # -- Changed Files Detection --
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'requirements*.txt'
              - 'ruff.toml'
              - 'pytest.ini'
              - 'alembic/**'
              - 'scripts/**'
            frontend:
              - 'trading-ui/**'
            infrastructure:
              - 'deploy/**'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.github/workflows/**'

  # -- Backend: Lint, Test, Security --
  backend-lint-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src tests --output-format=github

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Pytest with coverage
        run: |
          pytest tests/ -v --tb=short --timeout=60 -x \
            -m "not slow" \
            --cov=src --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80
        env:
          PYTHONPATH: .
          ENV: test
          PAPER_MODE: "true"

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Security scan
        if: matrix.python-version == '3.11'
        run: |
          bandit -r src/ -ll --skip B101 -f json -o bandit-report.json || true
          pip-audit --strict --desc on || true

      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "password.*=.*['\"].*['\"]" src/ --include="*.py" \
            | grep -v "test" | grep -v "#" | grep -v "example" \
            | grep -v "placeholder" | grep -v "__pycache__"

  # -- Backend: Integration Tests (push only) --
  backend-integration:
    needs: [changes, backend-lint-test]
    if: |
      (needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main') &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_PRIMARY }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Integration tests
        run: python -m pytest tests/integration/ -v --timeout=120
        env:
          PYTHONPATH: .
          ENV: test
          PAPER_MODE: "true"

  # -- Frontend: Lint, Type-check, Build --
  frontend-lint-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: trading-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # -- Docker Build (push to develop/staging/main only) --
  docker-build:
    needs: [backend-lint-test, frontend-lint-build]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop') &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SHA=${GITHUB_SHA::8}
          echo "tag=${BRANCH}-${SHA}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          tags: |
            trading-api:${{ steps.tag.outputs.tag }}
            trading-api:${{ steps.tag.outputs.branch }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.frontend
          push: false
          tags: |
            trading-frontend:${{ steps.tag.outputs.tag }}
            trading-frontend:${{ steps.tag.outputs.branch }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -- PR Quality Gate --
  pr-quality:
    if: github.event_name == 'pull_request'
    needs: [backend-lint-test, frontend-lint-build]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "All quality gates passed"
