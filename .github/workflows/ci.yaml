name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout pytest-cov httpx ruff

      - name: Syntax check
        run: |
          python -m py_compile src/**/*.py || find src -name "*.py" -exec python -m py_compile {} +

      - name: Ruff lint
        run: ruff check src tests --output-format=github

      - name: Pytest
        run: pytest tests/ -v --tb=short --timeout=60 -x -m "not slow" --cov=src --cov-fail-under=80
        env:
          PYTHONPATH: .
          ENV: test
          PAPER_MODE: "true"

      - name: Check for hardcoded secrets
        run: |
          # Fail if any obvious secrets patterns are found in source
          ! grep -rn "password.*=.*['\"].*['\"]" src/ --include="*.py" | grep -v "test" | grep -v "#" | grep -v "example" | grep -v "placeholder" | grep -v "__pycache__"

      - name: Security scan
        run: |
          pip install bandit pip-audit
          bandit -r src/ -ll --skip B101
          pip-audit --strict --desc on

      - name: Integration tests
        run: |
          python -m pytest tests/integration/ -v --timeout=60
        env:
          PYTHONPATH: .
          ENV: test
          PAPER_MODE: "true"

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: trading-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f deploy/docker/Dockerfile.api -t trading-api:ci .

      - name: Build frontend image
        run: docker build -f deploy/docker/Dockerfile.frontend -t trading-frontend:ci .
