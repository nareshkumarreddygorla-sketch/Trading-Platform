# Ruff linter configuration
target-version = "py311"
line-length = 120

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "S",     # flake8-bandit (security)
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
]
ignore = [
    "S101",  # assert used (OK in tests)
    "S603",  # subprocess without shell=True (OK)
    "S607",  # partial path to executable
    "E501",  # line too long (handled by formatter)
    "UP042", # str+Enum inheritance — standard pattern for FastAPI serialization
    "S110",  # try-except-pass — intentional in resilient trading pipelines
    "S112",  # try-except-continue — intentional in batch processing loops
    "E741",  # ambiguous variable name `l` — used extensively in lambda/list contexts
    "B008",  # function call in defaults — standard for FastAPI Depends()/Query()
    "B007",  # unused loop variable — often intentional in dict.items() iteration
    "B905",  # zip() without strict= — strict not needed for same-length iters
    "B023",  # function defined in loop — closures in async pipelines
    "S311",  # pseudo-random — non-crypto uses (e.g., jitter, sampling)
    "S324",  # md5 — used for non-security cache keys only
    "S310",  # URL open audit — acceptable in controlled data feeds
    "S314",  # XML parse — controlled input
    "S104",  # possible binding to all interfaces — expected for containers
    "S108",  # insecure temp file — acceptable in feature store
    "S608",  # SQL injection — parameterized in practice
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "S107", "B017", "E731", "F841", "B904", "E402"]  # Tests: asserts, passwords, blind exceptions, lambdas, unused vars, imports
"scripts/**/*.py" = ["S108", "E402"]  # Allow temp file paths and late imports in scripts

[lint.isort]
known-first-party = ["src"]
