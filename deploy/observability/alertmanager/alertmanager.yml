# Alertmanager configuration for AlphaForge Trading Platform
# Webhook URL is configurable via ALERTMANAGER_WEBHOOK_URL env var in docker-compose.yml

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default-webhook
  routes:
    - match:
        severity: critical
      receiver: default-webhook
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: default-webhook
      repeat_interval: 4h

receivers:
  - name: default-webhook
    webhook_configs:
      - url: "${ALERTMANAGER_WEBHOOK_URL}"
        send_resolved: true
        http_config:
          follow_redirects: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
