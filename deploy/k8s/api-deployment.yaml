apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-api
  namespace: trading
  labels:
    app: trading-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trading-api
  template:
    metadata:
      labels:
        app: trading-api
    spec:
      containers:
        - name: api
          image: trading-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: trading-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trading-api
  namespace: trading
spec:
  selector:
    app: trading-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
