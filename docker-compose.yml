# AlphaForge Trading Platform - Docker Compose
# Single source of truth for all services.
#
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose --profile sentinel up -d # Start with Redis Sentinel HA
#   docker compose logs -f api              # Tail API logs
#
# Production override:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ── Trading API (multi-worker via gunicorn) ──
  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    container_name: alphaforge-api
    ports:
      - "127.0.0.1:${API_EXTERNAL_PORT:-8000}:8000"
    environment:
      - PYTHONPATH=/app
      - PAPER_MODE=${PAPER_MODE:-true}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WORKERS=${WORKERS:-4}
      - GRACEFUL_TIMEOUT=30
      # Redis
      - REDIS_MODE=${REDIS_MODE:-standalone}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - REDIS_SENTINEL_HOSTS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - REDIS_SENTINEL_MASTER=${REDIS_SENTINEL_MASTER:-alphaforge-master}
      - REDIS_SENTINEL_PASSWORD=${REDIS_SENTINEL_PASSWORD:-}
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER:-alphaforge}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-alphaforge}
      # Broker credentials
      - ANGEL_ONE_API_KEY=${ANGEL_ONE_API_KEY:-}
      - ANGEL_ONE_API_SECRET=${ANGEL_ONE_API_SECRET:-}
      - ANGEL_ONE_TOKEN=${ANGEL_ONE_TOKEN:-}
      - ANGEL_ONE_CLIENT_ID=${ANGEL_ONE_CLIENT_ID:-}
      # Notifications
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # Trading
      - INITIAL_EQUITY=${INITIAL_EQUITY:-1000000}
      # Auth
      - JWT_SECRET=${JWT_SECRET:-}
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - api_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped
    stop_grace_period: 35s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "alphaforge-api"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - alphaforge-internal
      - alphaforge-external

  # ── Nginx TLS Reverse Proxy ──
  nginx:
    image: nginx:1.25-alpine
    container_name: alphaforge-nginx
    ports:
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - alphaforge-external

  # ── Redis Primary (fill dedup, caching, pub/sub) ──
  redis:
    image: redis:7-alpine
    container_name: alphaforge-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --save 900 1
        --save 300 10
        --save 60 10000
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
        --tcp-keepalive 60
        --timeout 300
        --hz 10
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - alphaforge-internal

  # ── Redis Sentinel Node 1 (HA failover detection) ──
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: alphaforge-sentinel-1
    profiles: ["sentinel"]
    command: >
      sh -c '
        mkdir -p /tmp/sentinel &&
        echo "port 26379" > /tmp/sentinel/sentinel.conf &&
        echo "sentinel monitor alphaforge-master redis 6379 2" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel auth-pass alphaforge-master ${REDIS_PASSWORD}" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel down-after-milliseconds alphaforge-master 5000" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel failover-timeout alphaforge-master 10000" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel parallel-syncs alphaforge-master 1" >> /tmp/sentinel/sentinel.conf &&
        redis-sentinel /tmp/sentinel/sentinel.conf
      '
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - alphaforge-internal

  # ── Redis Sentinel Node 2 ──
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: alphaforge-sentinel-2
    profiles: ["sentinel"]
    command: >
      sh -c '
        mkdir -p /tmp/sentinel &&
        echo "port 26379" > /tmp/sentinel/sentinel.conf &&
        echo "sentinel monitor alphaforge-master redis 6379 2" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel auth-pass alphaforge-master ${REDIS_PASSWORD}" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel down-after-milliseconds alphaforge-master 5000" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel failover-timeout alphaforge-master 10000" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel parallel-syncs alphaforge-master 1" >> /tmp/sentinel/sentinel.conf &&
        redis-sentinel /tmp/sentinel/sentinel.conf
      '
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - alphaforge-internal

  # ── Redis Sentinel Node 3 ──
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: alphaforge-sentinel-3
    profiles: ["sentinel"]
    command: >
      sh -c '
        mkdir -p /tmp/sentinel &&
        echo "port 26379" > /tmp/sentinel/sentinel.conf &&
        echo "sentinel monitor alphaforge-master redis 6379 2" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel auth-pass alphaforge-master ${REDIS_PASSWORD}" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel down-after-milliseconds alphaforge-master 5000" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel failover-timeout alphaforge-master 10000" >> /tmp/sentinel/sentinel.conf &&
        echo "sentinel parallel-syncs alphaforge-master 1" >> /tmp/sentinel/sentinel.conf &&
        redis-sentinel /tmp/sentinel/sentinel.conf
      '
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - alphaforge-internal

  # ── PostgreSQL (orders, positions, audit trail) ──
  postgres:
    image: postgres:16-alpine
    container_name: alphaforge-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alphaforge}
      POSTGRES_USER: ${POSTGRES_USER:-alphaforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "checkpoint_completion_target=0.9"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alphaforge} -d ${POSTGRES_DB:-alphaforge}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - alphaforge-internal

  # ── Prometheus (metrics collection) ──
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: alphaforge-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deploy/observability/prometheus:/etc/prometheus
      - ./deploy/monitoring:/etc/prometheus/monitoring
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - alphaforge-internal

  # ── Alertmanager (alert routing + notification) ──
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alphaforge-alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-http://api:8000/api/v1/alerts/webhook}
    volumes:
      - ./deploy/observability/alertmanager:/etc/alertmanager
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat /etc/alertmanager/alertmanager.yml | sed "s|\$${ALERTMANAGER_WEBHOOK_URL}|$$ALERTMANAGER_WEBHOOK_URL|g" > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager --web.listen-address=:9093
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/ready"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
    networks:
      - alphaforge-internal

  # ── Grafana (dashboards + visualization) ──
  grafana:
    image: grafana/grafana:10.4.0
    container_name: alphaforge-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/observability/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - alphaforge-internal
      - alphaforge-external

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  api_logs:
    driver: local

networks:
  # Internal network: services communicate privately (Redis, Postgres, Prometheus)
  alphaforge-internal:
    driver: bridge
    internal: true
  # External network: services that need external access (API, Nginx, Grafana)
  alphaforge-external:
    driver: bridge
